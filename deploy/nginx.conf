# Reverse proxy for remote deployments (SE-4/OQ-12): terminates TLS in
# front of avb-introspectd and forwards the WebSocket event stream.
#
# Used as-is by deploy/docker-compose.yml (upstream "app"). For a
# bare-metal nginx, change the upstream server to 127.0.0.1:8342 and
# drop this file into /etc/nginx/conf.d/.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream avb_backend {
    server app:8342;          # bare metal: 127.0.0.1:8342
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Uploads up to the backend's --max-upload-mb (default 1024 MiB, BE-5).
    client_max_body_size 1024m;
    # Stream pcap uploads through instead of buffering them to disk twice.
    proxy_request_buffering off;

    # ---- app mounted under a path prefix: http://<ip>/avb_investigation/ --
    # Rename the prefix freely — the frontend detects it at runtime, no
    # rebuild needed. The trailing slash on proxy_pass strips the prefix
    # before the request reaches the backend.

    location = /avb_investigation { return 301 /avb_investigation/; }

    location /avb_investigation/api/ws {
        proxy_pass http://avb_backend/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    location /avb_investigation/ {
        proxy_pass http://avb_backend/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- app also available at the site root (remove if the root serves
    # something else) --------------------------------------------------------

    # WebSocket event stream (BE-4): upgrade headers + long idle timeout,
    # no buffering so deflated event batches reach the browser immediately.
    location /api/ws {
        proxy_pass http://avb_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    # REST API + static frontend.
    location / {
        proxy_pass http://avb_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

